name: Pre-commit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 1º Passo: Instalar o pnpm primeiro para que o setup-node possa usá-lo
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # 2º Passo: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # Otimização gratuita

      # 3º Passo: Setup Node com cache funcionando
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Instalar dependências do frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      # 4º Passo: Instalar pre-commit e Cache de Hooks
      - name: Cache Pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Instalar pre-commit
        run: pip install pre-commit

      - name: Rodar pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
