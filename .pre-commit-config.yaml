repos:
  # 🐍 Python (backend)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # 🌐 ESLint (usar o do projeto)
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c "cd frontend && pnpm lint"
        language: system
        pass_filenames: false

  # 💅 Prettier + Tailwind
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.0
    hooks:
      - id: prettier
        files: ^frontend/.*\.(js|ts|jsx|tsx|json|css|md)$
        additional_dependencies:
          - prettier
          - prettier-plugin-tailwindcss
